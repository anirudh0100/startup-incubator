databases:
  - name: startup-incubator-db
    databaseName: startup_incubator
    user: startup_user
    plan: free

services:
  - type: web
    name: startup-incubator
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && gunicorn startup.wsgi --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: startup-incubator-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
