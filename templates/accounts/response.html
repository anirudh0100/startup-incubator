<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <meta http-equiv="refresh" content="4;url=/" />
    <link rel="shortcut icon" href="../static/interview.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat');
body {
  background-color: #111;
  height:100vh;
}

.title {
  font-family: "Montserrat";
  text-align: center;
  color: #FFF;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  letter-spacing: 1px;
}

h1 {
  background-image: url('https://media3.giphy.com/media/lF7BHJ8f0OJlC/giphy.gif?cid=ecf05e470vi54fxfwrildhlwjokei4xz0klyrwilm62k3o21&rid=giphy.gif&ct=g');
  background-size: cover;
  color: transparent;
  background-clip: border-box;
  -moz-background-clip: text;
  -webkit-background-clip: text;
  text-transform: uppercase;
  font-size: 120px;
  line-height: .75;
  margin: 10px 0;
}
    </style>
</head>
<body>
    <div class="title">
        <h1 style="letter-spacing: 2px; line-height: 135px;"> Thankyou for registering with us. </h1>
        <p style="color: rgba(255,255,255,0.6); font-family: Montserrat, sans-serif; font-size: 1.1rem; margin-top: 30px;">Redirecting to home page in <span id="countdown">4</span> seconds...</p>
    </div>

    <script>
      let sec = 4;
      const el = document.getElementById('countdown');
      setInterval(() => { sec--; if (el && sec >= 0) el.textContent = sec; }, 1000);
      setTimeout(() => { window.location.href = '/'; }, 4000);
    </script>
</body>
</html>
